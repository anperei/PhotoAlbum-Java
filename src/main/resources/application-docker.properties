# Docker-specific datasource configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/photoalbum?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:photoalbum}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=${SPRING_DATASOURCE_DRIVER_CLASS_NAME:org.postgresql.Driver}
spring.datasource.azure.passwordless-enabled=${SPRING_DATASOURCE_AZURE_PASSWORDLESS_ENABLED:true}
spring.cloud.azure.credential.managed-identity-enabled=${SPRING_CLOUD_AZURE_CREDENTIAL_MANAGED_IDENTITY_ENABLED:true}
spring.cloud.azure.credential.client-id=${SPRING_CLOUD_AZURE_CREDENTIAL_CLIENT_ID:${AZURE_CLIENT_ID:}}

# Character encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# JPA Configuration for Docker
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

# Other settings
server.port=8080
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Logging for Docker
logging.level.com.photoalbum=INFO
logging.level.org.springframework.web=WARN
logging.level.org.hibernate.SQL=DEBUG

# Telemetry
spring.application.name=photo-album
applicationinsights.connection.string=${APPLICATIONINSIGHTS_CONNECTION_STRING:}
management.endpoints.web.exposure.include=health,info,metrics,prometheus