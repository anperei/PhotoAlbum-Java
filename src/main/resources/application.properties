# Spring Boot Configuration
server.port=8080

# Character encoding
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true

# Azure Database for PostgreSQL Configuration
# Remember to set the values for the environment variables below
spring.datasource.url=jdbc:postgresql://${POSTGRESQL_SERVER}.postgres.database.azure.com:${POSTGRESQL_PORT}/${POSTGRESQL_DATABASE}?sslmode=require
spring.datasource.username=${POSTGRESQL_USERNAME}
spring.datasource.password=${POSTGRESQL_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA Configuration
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=create
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# File Upload Configuration
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=50MB

# Application Configuration - File Upload Validation
app.file-upload.max-file-size-bytes=10485760
app.file-upload.allowed-mime-types=image/jpeg,image/png,image/gif,image/webp
app.file-upload.max-files-per-upload=10

# Logging
logging.level.com.photoalbum=DEBUG
logging.level.org.springframework.web=DEBUG
